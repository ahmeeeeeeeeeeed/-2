name: Sign Existing APK

on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Find APK
        run: |
          echo "APK_FILE=$(find . -maxdepth 1 -name '*.apk' -type f | head -1)" >> $GITHUB_ENV
          echo "Found APK: ${{ env.APK_FILE }}"
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: malinskiy/action-android@v1
        with:
          cmdline-tools-version: 9477386
      
      - name: Create Keystore
        run: |
          keytool -genkey -v -keystore app.keystore \
            -alias appkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass 123456 \
            -keypass 123456 \
            -dname "CN=App, OU=App, O=App, L=City, S=State, C=US"
      
      - name: Sign APK
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks app.keystore \
            --ks-pass pass:123456 \
            --key-pass pass:123456 \
            --out signed-app.apk \
            ${{ env.APK_FILE }}
      
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-app
          path: signed-app.apk
